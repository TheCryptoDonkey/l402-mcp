    <polygon points="940,50 960,40 980,50 980,70 960,80 940,70"/>
    <polygon points="1020,50 1040,40 1060,50 1060,70 1040,80 1020,70"/>
    <polygon points="1100,50 1120,40 1140,50 1140,70 1120,80 1100,70"/>
    <polygon points="1180,50 1200,40 1220,50 1220,70 1200,80 1180,70"/>
    <!-- Row 3 -->
    <polygon points="40,80 60,70 80,80 80,100 60,110 40,100"/>
    <polygon points="120,80 140,70 160,80 160,100 140,110 120,100"/>
    <polygon points="200,80 220,70 240,80 240,100 220,110 200,100"/>
