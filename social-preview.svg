  <!-- Illustration: Lightning Network bolt with signal waves and floating coins -->
  <g transform="translate(220, 140)">
    <!-- Signal waves (Nostr discovery broadcast) -->
    <g transform="translate(160, 180)" stroke="#22d3ee" fill="none" stroke-linecap="round">
      <path d="M 60,0 Q 80,-20 80,-40 Q 80,-60 60,-80" stroke-width="2.5" opacity="0.25"/>
      <path d="M 72,5 Q 100,-20 100,-45 Q 100,-70 72,-95" stroke-width="2" opacity="0.15"/>
      <path d="M 84,10 Q 118,-18 118,-48 Q 118,-78 84,-106" stroke-width="1.5" opacity="0.08"/>
      <!-- Left side waves -->
      <path d="M -60,0 Q -80,-20 -80,-40 Q -80,-60 -60,-80" stroke-width="2.5" opacity="0.25" transform="scale(-1,1)"/>
      <path d="M -72,5 Q -100,-20 -100,-45 Q -100,-70 -72,-95" stroke-width="2" opacity="0.15" transform="scale(-1,1)"/>
    </g>

    <!-- Lightning Network zigzag bolt (classic LN shape) -->
    <g transform="translate(160, 180)" filter="url(#outerGlow)">
      <!--
        Classic LN bolt outline:
        Top point → diagonal down-right → jag left → diagonal down-right → bottom point
        Drawn as a filled polygon with two facets for the geometric/faceted look.
      -->
      <!-- Left facet (darker) -->
      <polygon points="25,-160  -35,-20  15,-20  -45,160  -25,160  25,20  -25,20  15,-160"
               fill="url(#amberDark)"/>
      <!-- Right facet (lighter) — offset to create depth -->
      <polygon points="25,-160  45,-160  -5,-20  45,-20  -15,160  -45,160  15,-20  -35,-20"
               fill="url(#amberLight)"/>
      <!-- Combined fill for clean shape -->
      <polygon points="35,-160  -25,-15  25,-15  -35,160  -15,160  45,-15  -5,-15  55,-160"
               fill="url(#amber)" opacity="0"/>
      <!-- Actual clean bolt shape -->
      <path d="M 30,-160 L -30,-10 L 20,-10 L -40,160 L -20,160 L 40,10 L -10,10 L 50,-160 Z"
            fill="url(#amber)"/>
      <!-- Left shadow facet overlay -->
      <path d="M 30,-160 L -30,-10 L 20,-10 L -40,160 L -30,160 L 30,-10 L -20,-10 L 40,-160 Z"
            fill="url(#amberDark)" opacity="0.4"/>
      <!-- Highlight edge -->
      <line x1="50" y1="-160" x2="-10" y2="10" stroke="#fef3c7" stroke-width="1.2" opacity="0.4"/>
      <line x1="20" y1="-10" x2="-40" y2="160" stroke="#fef3c7" stroke-width="0.8" opacity="0.25"/>
    </g>

    <!-- Floating sat coins -->
    <g opacity="0.65">
      <!-- Coin 1 (top right) -->
      <ellipse cx="255" cy="80" rx="12" ry="13" fill="none" stroke="#fbbf24" stroke-width="1.8"/>
      <text x="255" y="85" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#fbbf24">S</text>
      <!-- Coin 2 (right) -->
      <ellipse cx="280" cy="145" rx="9" ry="10" fill="none" stroke="#f59e0b" stroke-width="1.3" opacity="0.6"/>
      <text x="280" y="149" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#f59e0b" opacity="0.6">S</text>
      <!-- Coin 3 (far right) -->
      <ellipse cx="300" cy="200" rx="7" ry="8" fill="none" stroke="#d97706" stroke-width="1" opacity="0.35"/>
      <text x="300" y="204" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#d97706" opacity="0.35">S</text>
      <!-- Coin 4 (top left) -->
      <ellipse cx="65" cy="100" rx="10" ry="11" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
      <text x="65" y="104" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#fbbf24" opacity="0.5">S</text>
      <!-- Coin 5 (bottom left) -->
      <ellipse cx="50" cy="260" rx="8" ry="9" fill="none" stroke="#d97706" stroke-width="1.2" opacity="0.3"/>
      <text x="50" y="264" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#d97706" opacity="0.3">S</text>
    </g>

    <!-- Network nodes (representing MCP tool calls) -->
    <g stroke="#475569" fill="#1e293b" opacity="0.4">
      <circle cx="80" cy="170" r="4" stroke-width="1.5"/>
      <circle cx="50" cy="200" r="3" stroke-width="1"/>
      <circle cx="240" cy="280" r="4" stroke-width="1.5"/>
      <circle cx="270" cy="260" r="3" stroke-width="1"/>
      <line x1="80" y1="170" x2="50" y2="200" stroke-width="0.8"/>
      <line x1="240" y1="280" x2="270" y2="260" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Divider -->
  <g transform="translate(580, 220)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="0" x2="6" y2="200" stroke="#334155" stroke-width="1" opacity="0.5"/>
    <!-- 402 badge -->
    <g transform="translate(-12, 82)">
      <rect x="0" y="0" width="30" height="18" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="15" y="13" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="9" font-weight="bold" fill="#f59e0b">402</text>
    </g>
  </g>

  <!-- Title: 402-mcp -->
  <text x="660" y="330" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Menlo', monospace" font-size="64" font-weight="bold" fill="#f8fafc" letter-spacing="-1">402-mcp</text>

  <!-- Tagline -->
  <text x="662" y="370" font-family="'Inter', -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">discover. pay. consume.</text>

  <!-- Keyword ticker along bottom -->
  <g opacity="0.06" fill="#94a3b8">
    <text y="622" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12" letter-spacing="1">
      <tspan x="40">mcp</tspan>
      <tspan x="100">l402</tspan>
      <tspan x="160">x402</tspan>
      <tspan x="220">lightning</tspan>
      <tspan x="320">cashu</tspan>
      <tspan x="390">nostr</tspan>
      <tspan x="455">nwc</tspan>
      <tspan x="505">ecash</tspan>
      <tspan x="575">sats</tspan>
      <tspan x="625">micropayments</tspan>
      <tspan x="780">ai-agent</tspan>
      <tspan x="870">bitcoin</tspan>
      <tspan x="950">macaroon</tspan>
      <tspan x="1050">typescript</tspan>
      <tspan x="1160">autonomous</tspan>
    </text>
  </g>
</svg>
